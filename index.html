<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SaaS Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
}

.hidden{
    display:none !important;
}

.auth-page{
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
}

.auth-card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.auth-card input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    margin-bottom:15px;
}

.blue{
    background:#2563eb;
}

.red{
    background:#ea4335;
}

.dashboard{
    display:none;
}

.layout{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:240px;
    background:#0f172a;
    color:white;
    padding:25px;
}

.logo{
    font-size:30px;
    font-weight:bold;
    margin-bottom:40px;
}

.menu-btn{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    text-align:left;
}

.main{
    flex:1;
}

.navbar{
    background:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.profile-top{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile-top img{
    width:45px;
    height:45px;
    border-radius:50%;
}

.logout-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.content{
    padding:30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
}

.form-row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.form-row input,
.form-row select{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

.add-btn{
    background:#10b981;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f8fafc;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-top:1px solid #eee;
}

.user-info{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-info img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.edit-btn{
    background:#3b82f6;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    margin-right:5px;
}

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.profile-page{
    display:none;
}

.profile-card{
    text-align:center;
}

.profile-card img{
    width:120px;
    height:120px;
    border-radius:50%;
    margin-bottom:20px;
}

.role-badge{
    display:inline-block;
    padding:8px 15px;
    background:#2563eb;
    color:white;
    border-radius:20px;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="auth-page" id="authPage">

<div class="auth-card">

<h1 id="authTitle">🚀 Login</h1>

<br>

<input type="text"
id="nameInput"
placeholder="Name"
class="hidden">

<input type="email"
id="emailInput"
placeholder="Email">

<input type="password"
id="passwordInput"
placeholder="Password">

<button class="btn blue"
id="mainBtn"
onclick="login()">
Login
</button>

<button class="btn red"
onclick="googleLogin()">
Continue with Google
</button>

<p style="text-align:center;">
<span onclick="toggleAuth()"
style="cursor:pointer;color:#2563eb;">
Switch Login/Register
</span>
</p>

</div>

</div>

<div class="dashboard" id="dashboard">

<div class="layout">

<div class="sidebar">

<div class="logo">
🚀 SaaS
</div>

<button class="menu-btn"
onclick="showUsers()">
👥 Users
</button>

<button class="menu-btn"
onclick="showProfile()">
👤 Profile
</button>

</div>

<div class="main">

<div class="navbar">

<h2>Dashboard</h2>

<div class="profile-top">

<img id="topPic"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<div>
<div id="topName"></div>
<div id="topEmail"
style="font-size:13px;color:gray;">
</div>
</div>

<button class="logout-btn"
onclick="logout()">
Logout
</button>

</div>

</div>

<div class="content">

<!-- USERS -->

<div id="usersPage">

<div class="card">

<h2>Users Management</h2>

<div class="form-row"
id="addUserBox">

<input type="text"
id="userName"
placeholder="Name">

<input type="email"
id="userEmail"
placeholder="Email">

<select id="userRole">
<option>User</option>
<option>Manager</option>
<option>Admin</option>
</select>

<button class="add-btn"
onclick="addUser()">
Add User
</button>

</div>

<table>

<thead>

<tr>
<th>User</th>
<th>Email</th>
<th>Role</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<!-- PROFILE -->

<div class="profile-page"
id="profilePage">

<div class="card profile-card">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<h2 id="profileName">
User
</h2>

<p>
<strong>Email:</strong>
<span id="profileEmail"></span>
</p>

<p>
<strong>Mobile:</strong>
<span id="profileMobile"></span>
</p>

<div class="role-badge"
id="profileRole">
User
</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const API =
"https://api-project-e4fn.onrender.com";

let isRegister = false;
let CURRENT_ROLE = "User";

const params =
new URLSearchParams(window.location.search);

if(params.get("token")){

    localStorage.setItem(
        "token",
        params.get("token")
    );

    window.history.replaceState(
        {},
        document.title,
        "/"
    );
}

const TOKEN =
localStorage.getItem("token");

if(TOKEN){

    showDashboard();
}

/* TOGGLE */

function toggleAuth(){

    isRegister = !isRegister;

    if(isRegister){

        document.getElementById("authTitle")
        .innerText = "📝 Register";

        document.getElementById("nameInput")
        .classList.remove("hidden");

        document.getElementById("mainBtn")
        .innerText = "Register";

        document.getElementById("mainBtn")
        .onclick = register;

    }else{

        document.getElementById("authTitle")
        .innerText = "🚀 Login";

        document.getElementById("nameInput")
        .classList.add("hidden");

        document.getElementById("mainBtn")
        .innerText = "Login";

        document.getElementById("mainBtn")
        .onclick = login;
    }
}

/* REGISTER */

function register(){

    fetch(API + "/register",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            name:
            document.getElementById("nameInput").value,

            email:
            document.getElementById("emailInput").value,

            password:
            document.getElementById("passwordInput").value
        })

    })

    .then(r=>r.json())

    .then(data=>{

        alert(data.message || data.error);

        if(data.message){

            toggleAuth();
        }
    });
}

/* LOGIN */

function login(){

    fetch(API + "/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            email:
            document.getElementById("emailInput").value,

            password:
            document.getElementById("passwordInput").value
        })

    })

    .then(r=>r.json())

    .then(data=>{

        if(data.token){

            localStorage.setItem(
                "token",
                data.token
            );

            location.reload();

        }else{

            alert(data.error);
        }
    });
}

/* GOOGLE LOGIN */

function googleLogin(){

    window.location.href =
    API + "/google_login";
}

/* DASHBOARD */

function showDashboard(){

    document.getElementById("authPage")
    .style.display = "none";

    document.getElementById("dashboard")
    .style.display = "block";

    fetch(API + "/me",{

        headers:{
            "Authorization":
            "Bearer " + TOKEN
        }

    })

    .then(r=>r.json())

    .then(user=>{

        CURRENT_ROLE = user.role;

        document.getElementById("topName")
        .innerText = user.name;

        document.getElementById("topEmail")
        .innerText = user.email;

        document.getElementById("profileName")
        .innerText = user.name;

        document.getElementById("profileEmail")
        .innerText = user.email;

        document.getElementById("profileMobile")
        .innerText = user.mobile;

        document.getElementById("profileRole")
        .innerText = user.role;

        if(user.picture){

            document.getElementById("topPic")
            .src = user.picture;

            document.getElementById("profilePic")
            .src = user.picture;
        }

        if(CURRENT_ROLE === "User"){

            document.getElementById("addUserBox")
            .style.display = "none";
        }

        loadUsers();
    });
}

/* USERS */

function loadUsers(){

    fetch(API + "/users",{

        headers:{
            "Authorization":
            "Bearer " + TOKEN
        }

    })

    .then(r=>r.json())

    .then(data=>{

        if(data.error){

            document.getElementById("usersPage")
            .innerHTML =
            `<div class="card">
            <h2>Access Restricted</h2>
            <p>You do not have permission.</p>
            </div>`;

            return;
        }

        let rows = "";

        data.forEach(user=>{

            rows += `
            <tr>

            <td>

            <div class="user-info">

            <img src="${
                user.picture ||
                'https://cdn-icons-png.flaticon.com/512/149/149071.png'
            }">

            <div>${user.name}</div>

            </div>

            </td>

            <td>${user.email}</td>

            <td>${user.role}</td>

            <td>
            ${
                CURRENT_ROLE !== "User"
                ?
                `
                <button class="edit-btn"
                onclick="editUser(
                ${user.id},
                '${user.name}',
                '${user.email}',
                '${user.role}'
                )">
                Edit
                </button>
                `
                :
                ''
            }

            ${
                CURRENT_ROLE === "Admin"
                ?
                `
                <button class="delete-btn"
                onclick="deleteUser(${user.id})">
                Delete
                </button>
                `
                :
                ''
            }

            </td>

            </tr>
            `;
        });

        document.getElementById("userTable")
        .innerHTML = rows;
    });
}

/* ADD USER */

function addUser(){

    fetch(API + "/users",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            "Authorization":
            "Bearer " + TOKEN
        },

        body:JSON.stringify({

            name:
            document.getElementById("userName").value,

            email:
            document.getElementById("userEmail").value,

            role:
            document.getElementById("userRole").value
        })

    })

    .then(r=>r.json())

    .then(data=>{

        alert(data.message || data.error);

        loadUsers();
    });
}

/* DELETE */

function deleteUser(id){

    fetch(API + "/users/" + id,{

        method:"DELETE",

        headers:{
            "Authorization":
            "Bearer " + TOKEN
        }

    })

    .then(r=>r.json())

    .then(data=>{

        alert(data.message || data.error);

        loadUsers();
    });
}

/* EDIT */

function editUser(id,name,email,role){

    const newName =
    prompt("Enter name",name);

    const newEmail =
    prompt("Enter email",email);

    const newRole =
    prompt("Enter role (Admin/Manager/User)",role);

    if(!newName || !newEmail) return;

    fetch(API + "/users/" + id,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json",
            "Authorization":
            "Bearer " + TOKEN
        },

        body:JSON.stringify({

            name:newName,
            email:newEmail,
            role:newRole
        })

    })

    .then(r=>r.json())

    .then(data=>{

        alert(data.message || data.error);

        loadUsers();
    });
}

/* NAVIGATION */

function showUsers(){

    document.getElementById("usersPage")
    .style.display = "block";

    document.getElementById("profilePage")
    .style.display = "none";
}

function showProfile(){

    document.getElementById("usersPage")
    .style.display = "none";

    document.getElementById("profilePage")
    .style.display = "block";
}

/* LOGOUT */

function logout(){

    localStorage.clear();

    window.location.href = "/";
}

</script>

</body>
</html>
