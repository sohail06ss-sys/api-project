<!DOCTYPE html>
<html>
<head>
  <title>SaaS Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    .sidebar {
      width: 220px;
      background: #111827;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 { margin-bottom: 30px; }

    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: #1f2937;
      color: white;
      border: none;
      cursor: pointer;
    }

    .main { flex: 1; }

    .navbar {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .content { padding: 20px; }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 6px 10px;
      border: none;
      cursor: pointer;
    }

    .add { background: green; color: white; }
    .delete { background: red; color: white; }

    table {
      width: 100%;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 15px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 SaaS App</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="showProfile()">Profile</button>
</div>

<div class="main">

  <div class="navbar">
    <div>Dashboard</div>
    <div>
      👤 <span id="userEmail"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- USERS -->
    <div id="usersSection">
      <h3>Users</h3>

      <input id="name" placeholder="Name">
      <input id="email" placeholder="Email">
      <button class="add" onclick="addUser()">Add</button>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="userList"></tbody>
      </table>
    </div>

    <!-- PROFILE -->
    <div id="profileSection" style="display:none;">
      <h3>Profile</h3>
      <p>Email: <span id="profileEmail"></span></p>
    </div>

  </div>
</div>

<script>

const API = "https://api-project-e4fn.onrender.com";
let TOKEN = localStorage.getItem("token");

/* HANDLE GOOGLE TOKEN */
const params = new URLSearchParams(window.location.search);
if (params.get("token")) {
  localStorage.setItem("token", params.get("token"));
  window.location.href = "/";
}

if (!TOKEN) {
  alert("Not logged in");
}

/* SHOW USER */
function parseJwt (t) {
  return JSON.parse(atob(t.split('.')[1]));
}

const user = parseJwt(TOKEN);
document.getElementById("userEmail").innerText = user.sub;
document.getElementById("profileEmail").innerText = user.sub;

/* LOAD USERS */
function loadUsers() {
  fetch(API + "/users", {
    headers: { "Authorization": "Bearer " + TOKEN }
  })
  .then(res => res.json())
  .then(data => {
    let rows = "";
    data.forEach(u => {
      rows += `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td>
            <button class="delete" onclick="deleteUser(${u.id})">X</button>
          </td>
        </tr>`;
    });
    document.getElementById("userList").innerHTML = rows;
  });
}

/* 🔥 FIXED ADD USER */
function addUser() {
  const nameVal = document.getElementById("name").value;
  const emailVal = document.getElementById("email").value;

  console.log("Sending:", nameVal, emailVal);

  fetch(API + "/users", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + TOKEN
    },
    body: JSON.stringify({
      name: nameVal,
      email: emailVal
    })
  })
  .then(res => res.json().then(data => ({ status: res.status, body: data })))
  .then(result => {
    console.log("Response:", result);

    if (result.status === 200) {
      alert("✅ User added");
      loadUsers();
    } else {
      alert("❌ Error: " + (result.body.error || "Unknown error"));
    }
  })
  .catch(err => {
    console.error(err);
    alert("❌ Network error");
  });
}

/* DELETE */
function deleteUser(id) {
  fetch(API + "/users/" + id, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + TOKEN }
  }).then(loadUsers);
}

/* PROFILE */
function showProfile() {
  document.getElementById("usersSection").style.display = "none";
  document.getElementById("profileSection").style.display = "block";
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

</script>

</body>
</html>
