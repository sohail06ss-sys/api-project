<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium SaaS Dashboard</title>

<link rel="stylesheet" href="/static/css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- AUTH SCREEN -->

<div id="authScreen" class="screen active">

    <div class="auth-container glass">

        <h1>⚡ Premium SaaS</h1>

        <p class="subtitle">
            Secure Flask + SQLite Authentication
        </p>

        <input type="text" id="name" placeholder="Name">

        <input type="email" id="email" placeholder="Email">

        <input type="password" id="password" placeholder="Password">

        <input type="text" id="mobile" placeholder="Mobile Number">

        <button onclick="registerUser()" class="btn primary">
            Register
        </button>

        <button onclick="loginUser()" class="btn primary">
            Login
        </button>

        <button onclick="googleLogin()" class="btn google">
            Continue with Google
        </button>

        <button onclick="forgotPassword()" class="btn secondary">
            Forgot Password
        </button>

    </div>

</div>

<!-- DASHBOARD -->

<div id="dashboardScreen" class="screen hidden">

    <div class="topbar glass">

        <div class="logo">⚡ Dashboard</div>

        <div class="topbar-right">

            <div id="currentUser"></div>

            <button onclick="logoutUser()" class="btn danger small">
                Logout
            </button>

        </div>

    </div>

    <!-- DASHBOARD GRID -->

    <div class="dashboard-grid">

        <!-- WEATHER -->

        <div class="glass weather-card">

            <h2>Weather Dashboard</h2>

            <div class="weather-main">

                <div>

                    <div id="temp" class="temp">38°</div>

                    <div id="weatherType">
                        Sunny
                    </div>

                </div>

                <div class="weather-icon">
                    ☀️
                </div>

            </div>

        </div>

        <!-- PROFILE -->

        <div class="glass profile-card">

            <h2>User Profile</h2>

            <img id="profileImage"
                 src="https://i.imgur.com/6VBx3io.png">

            <h3 id="profileName">User</h3>

            <p id="profileEmail"></p>

            <p id="profileRole"></p>

            <p id="profileMobile"></p>

        </div>

    </div>

    <!-- ADMIN PANEL -->

    <div id="adminPanel"
         class="glass admin-panel hidden">

        <div class="admin-header">

            <h2>User Management</h2>

        </div>

        <!-- ADD USER -->

        <div class="add-user-grid">

            <input type="text"
                   id="newUserName"
                   placeholder="Name">

            <input type="email"
                   id="newUserEmail"
                   placeholder="Email">

            <input type="text"
                   id="newUserMobile"
                   placeholder="Mobile">

            <button onclick="addUser()"
                    class="btn primary">

                Add User

            </button>

        </div>

        <!-- USERS TABLE -->

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Mobile</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="usersTable"></tbody>

        </table>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
